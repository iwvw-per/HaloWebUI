name: Validate and publish Docker image

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

concurrency:
  group: go-docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: iwvw/halowebui
  IMAGE_TAG: ${{ github.ref == 'refs/heads/main' && 'latest' || 'dev' }}

jobs:
  backend-checks:
    name: Backend checks
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Test Go backend
        working-directory: backend
        run: go test ./...
      - name: Vet Go backend
        working-directory: backend
        run: go vet ./...

  frontend-checks:
    name: Frontend checks
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
      - name: Install frontend dependencies
        run: npm ci --ignore-scripts --prefer-offline --no-audit
      - name: Test frontend
        run: npm run test:frontend -- --run

  build-and-publish:
    name: Build, verify and publish ${{ github.ref == 'refs/heads/main' && 'latest' || 'dev' }}
    needs:
      - backend-checks
      - frontend-checks
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          provenance: false
          build-args: |
            BUILD_HASH=${{ github.sha }}
            GO_VERSION=1.25
          cache-from: type=gha,scope=halowebui
          cache-to: type=gha,mode=max,scope=halowebui
      - name: Check image size
        shell: bash
        run: |
          set -euo pipefail
          image='${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}'
          image_size=$(docker image inspect --format '{{.Size}}' "$image")
          if [ "$image_size" -ge $((100 * 1024 * 1024)) ]; then
            echo "Go image is $image_size bytes, over 100 MiB"
            exit 1
          fi
      - name: Check runtime contents
        shell: bash
        run: |
          set -euo pipefail
          image='${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}'
          container_id=$(docker create "$image")
          forbidden=$(docker export "$container_id" | tar -tf - | grep -Eio '(^|/)(python|python3|pip|uvicorn|fastapi|site-packages)(/|$)' | head -n 20 || true)
          docker rm "$container_id" >/dev/null
          if [ -n "$forbidden" ]; then
            echo "Forbidden Python runtime paths found in image:"
            echo "$forbidden"
            exit 1
          fi
      - name: Start smoke-test container
        run: |
          docker run -d --name halowebui-go \
            -p 18080:8080 \
            -e WEBUI_SECRET_KEY=ci-only-secret \
            -e OPENAI_API_KEY= \
            -e HALO_GO_MEMORY_LIMIT_MIB=48 \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
      - name: Check health and memory
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:18080/health >/dev/null; then
              break
            fi
            if [ "$attempt" = 60 ]; then
              docker logs halowebui-go
              exit 1
            fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:18080/api/config >/dev/null
          usage_bytes=$(docker inspect --format '{{.State.Pid}}' halowebui-go | xargs -r -I{} sh -c 'awk "/VmRSS:/ {print \$2 * 1024}" /proc/{}/status')
          if [ -n "$usage_bytes" ] && [ "$usage_bytes" -ge $((100 * 1024 * 1024)) ]; then
            echo "Go process RSS is ${usage_bytes} bytes, over 100 MiB"
            docker stats --no-stream halowebui-go
            exit 1
          fi
          docker stats --no-stream halowebui-go
      - name: Clean up smoke-test container
        if: always()
        run: docker rm -f halowebui-go || true
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push verified image
        run: docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

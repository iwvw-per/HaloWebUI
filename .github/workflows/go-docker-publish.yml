name: Build and publish Go backend image

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - codex/backend-refactor
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

concurrency:
  group: go-docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: iwvw/halowebui

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Test Go backend
        working-directory: backend
        run: go test ./...

  build-and-publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=git-,format=short
            type=raw,value=go-edge,enable=${{ github.ref != 'refs/heads/main' }}
            type=raw,value=slim,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - name: Build and push Go-only image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          build-args: |
            BUILD_HASH=${{ github.sha }}
            GO_VERSION=1.25
          cache-from: type=gha,scope=go-backend
          cache-to: type=gha,mode=min,scope=go-backend
      - name: Pull published image for smoke test
        run: docker pull ${{ env.IMAGE_NAME }}:git-${GITHUB_SHA::7}
      - name: Verify slim image contents and size
        shell: bash
        run: |
          set -euo pipefail
          image='${{ env.IMAGE_NAME }}:git-'"${GITHUB_SHA::7}"
          image_size=$(docker image inspect --format '{{.Size}}' "$image")
          if [ "$image_size" -ge $((100 * 1024 * 1024)) ]; then
            echo "Go slim image is $image_size bytes, over 100 MiB"
            exit 1
          fi
          container_id=$(docker create "$image")
          forbidden=$(docker export "$container_id" | tar -tf - | grep -Eio '(^|/)(python|python3|pip|uvicorn|fastapi|site-packages)(/|$)' | head -n 20 || true)
          docker rm "$container_id" >/dev/null
          if [ -n "$forbidden" ]; then
            echo "Forbidden Python runtime paths found in image:"
            echo "$forbidden"
            exit 1
          fi
      - name: Start image
        run: |
          docker run -d --name halowebui-go \
            -p 18080:8080 \
            -e WEBUI_SECRET_KEY=ci-only-secret \
            -e OPENAI_API_KEY= \
            -e HALO_GO_MEMORY_LIMIT_MIB=48 \
            ${{ env.IMAGE_NAME }}:git-${GITHUB_SHA::7}
      - name: Health and memory gate
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:18080/health >/dev/null; then
              break
            fi
            if [ "$attempt" = 60 ]; then
              docker logs halowebui-go
              exit 1
            fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:18080/api/config >/dev/null
          usage_bytes=$(docker inspect --format '{{.State.Pid}}' halowebui-go | xargs -r -I{} sh -c 'awk "/VmRSS:/ {print \$2 * 1024}" /proc/{}/status')
          if [ -n "$usage_bytes" ] && [ "$usage_bytes" -ge $((100 * 1024 * 1024)) ]; then
            echo "Go slim process RSS is ${usage_bytes} bytes, over 100 MiB"
            docker stats --no-stream halowebui-go
            exit 1
          fi
          docker stats --no-stream halowebui-go
      - name: Stop smoke container
        if: always()
        run: docker rm -f halowebui-go || true

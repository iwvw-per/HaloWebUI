name: Release

on:
  push:
    tags:
      - v*

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Extract latest CHANGELOG entry
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          CHANGELOG_CONTENT=$(awk -v version="$version" '
            BEGIN {
              header = "## [" version "]";
              found = 0;
            }
            index($0, header) == 1 {
              found = 1;
            }
            found && /^## \[/ && index($0, header) != 1 {
              exit;
            }
            found {
              print;
            }
          ' CHANGELOG.md)
          if [ -z "$CHANGELOG_CONTENT" ]; then
            CHANGELOG_CONTENT="Release ${GITHUB_REF_NAME}"
          fi
          {
            echo "content<<EOF"
            printf '%s\n' "$CHANGELOG_CONTENT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        uses: actions/github-script@v9
        env:
          CHANGELOG_CONTENT: ${{ steps.changelog.outputs.content }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const body = process.env.CHANGELOG_CONTENT || `Release ${tag}`;

            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tag,
              });

              const updated = await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existing.data.id,
                tag_name: tag,
                name: tag,
                body: body,
                draft: false,
                prerelease: false,
              });

              console.log(`Updated release ${updated.data.html_url}`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              const release = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: tag,
                body: body,
                draft: false,
                prerelease: false,
              });

              console.log(`Created release ${release.data.html_url}`);
            }

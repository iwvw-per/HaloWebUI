name: Bug Report
description: Report a reproducible HaloWebUI problem
title: 'issue: '
labels: ['bug', 'triage']
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Search existing issues first. Remove API keys, JWTs, cookies, user data and backup contents from every log or screenshot.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and discussions.
          required: true
        - label: I reproduced this with the latest `iwvw/halowebui` image or current source.
          required: true
        - label: I removed all secrets and personal data.
          required: true
  - type: dropdown
    id: installation
    attributes:
      label: Installation method
      options:
        - Docker
        - Docker Compose
        - Kubernetes
        - Go source
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: HaloWebUI version or image tag
      placeholder: latest, dev, or commit SHA
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, browser, memory limit and reverse proxy
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Configure ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Sanitized evidence
      description: Include browser console, container logs, `/health` result and relevant screenshots.
    validations:
      required: true

name: Feature Request
description: Propose a HaloWebUI capability or improvement
title: 'feat: '
labels: ['triage']
assignees: []
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and discussions.
          required: true
        - label: This request fits the Svelte frontend and Go-only backend architecture.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the user problem and who encounters it.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Desired solution
      description: Describe observable behavior, not only implementation details.
    validations:
      required: true
  - type: textarea
    id: resources
    attributes:
      label: Resource and compatibility impact
      description: Note memory, disk, migration, API, security and rollback considerations.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: context
    attributes:
      label: Additional context
